<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Estudiantes</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<div class="container">
    <h1>Lista de Estudiantes</h1>
    <a class="button" th:href="@{/estudiantes/nuevo}">Nuevo Estudiante</a>
    <table>
    <thead>

    <tr><th>Nombre</th><th>Apellido</th><th>Correo</th><th>Carrera</th><th>Acciones</th></tr>
    </thead>
    <tbody>
    <tr th:each="e : ${estudiantes}">
        <td th:text="${e.nombre}"></td>
        <td th:text="${e.apellido}"></td>
        <td th:text="${e.correo}"></td>
        <td th:text="${e.carrera}"></td>
        <td class="actions">
            <a class="button secondary" th:href="@{/estudiantes/editar/{id}(id=${e.id})}">Editar</a>
            <a class="button" th:href="@{/estudiantes/eliminar/{id}(id=${e.id})}">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>
    </div>
</body>
</html>
