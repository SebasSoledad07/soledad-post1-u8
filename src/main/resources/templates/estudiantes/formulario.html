<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${titulo}">Formulario</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<div class="container">
    <h1 th:text="${titulo}"></h1>
    <form th:action="@{/estudiantes/guardar}" th:object="${estudiante}"
          method="post">
    <input type="hidden" th:field="*{id}" />
    <div>
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}" />
        <span th:if="${#fields.hasErrors('nombre')}"
              th:errors="*{nombre}"></span>
    </div>
    <div>
        <label>Apellido:</label>
        <input type="text" th:field="*{apellido}" />
        <span th:if="${#fields.hasErrors('apellido')}"
              th:errors="*{apellido}"></span>
    </div>
    <div>
        <label>Correo:</label>
        <input type="email" th:field="*{correo}" />
        <span th:if="${#fields.hasErrors('correo')}"
              th:errors="*{correo}"></span>
    </div>
    <div>
        <label>Carrera:</label>
        <input type="text" th:field="*{carrera}" />
        <span th:if="${#fields.hasErrors('carrera')}"
              th:errors="*{carrera}"></span>
    </div>
    <div class="footer">
        <button type="submit">Guardar</button>
        <a class="button secondary" th:href="@{/estudiantes}">Cancelar</a>
    </div>
    </form>
    </div>
</body>
</html>
