# Conexión a MySQL
# URL en una sola línea: useSSL debe tener valor TRUE/FALSE (no cadena vacía)
spring.datasource.url=jdbc:mysql://localhost:3306/estudiantes_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Usar el dialecto genérico o dejar que Hibernate lo detecte automáticamente
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Puerto del servidor
server.port=8080